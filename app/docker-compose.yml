# version is now using "compose spec"
# v2 and v3 are now combined!
# docker-compose v1.27+ required

services:

  # ============================================================
  # APPLICATION SERVICES
  # ============================================================

  vote:
    build:
      context: ./vote
      target: dev
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
     - ./vote:/usr/local/app
     # === OBSERVABILITY: Mount tracing config from observability/tracing/ ===
     - ../observability/tracing/vote-tracing.py:/usr/local/app/tracing.py
    ports:
      - "5000:80"
    networks:
      - front-tier
      - back-tier

  result:
    build: ./result
    # use nodemon rather than node for local dev
    entrypoint: nodemon --inspect=0.0.0.0 server.js
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./result:/usr/local/app
      # === OBSERVABILITY: Mount tracing config from observability/tracing/ ===
      - ../observability/tracing/result-tracing.js:/usr/local/app/tracing.js
    ports:
      - "5001:80"
      - "127.0.0.1:9229:9229"
    networks:
      - front-tier
      - back-tier

  worker:
    build:
      context: ./worker
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - back-tier

  redis:
    image: redis:alpine
    volumes:
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/redis.sh
      interval: "5s"
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - "db-data:/var/lib/postgresql/data"
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/postgres.sh
      interval: "5s"
    networks:
      - back-tier

  # this service runs once to seed the database with votes
  # it won't run unless you specify the "seed" profile
  # docker compose --profile seed up -d
  seed:
    build: ./seed-data
    profiles: ["seed"]
    depends_on:
      vote:
        condition: service_healthy
    networks:
      - front-tier
    restart: "no"

  # ============================================================
  # OBSERVABILITY — TRACING (Pillar 3)
  # Jaeger: trace storage and UI (port 16686)
  # OTel Collector: receives traces from apps, forwards to Jaeger
  # Config: observability/tracing/otel-collector-config.yml
  # ============================================================

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - back-tier
      - front-tier

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ../observability/tracing/otel-collector-config.yml:/etc/otel-collector-config.yml
    command: ["--config=/etc/otel-collector-config.yml"]
    depends_on:
      - jaeger
    networks:
      - back-tier

  # ============================================================
  # OBSERVABILITY — LOGGING (Pillar 2)
  # Loki: log storage (port 3100)
  # Promtail: reads Docker container logs and sends to Loki
  # Config: observability/logging/promtail-config.yml
  # ============================================================

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    networks:
      - back-tier

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../observability/logging/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - back-tier

  # ============================================================
  # OBSERVABILITY — METRICS (Pillar 1)
  # Prometheus: metrics collection (port 9090)
  # Grafana: visualization dashboard for all 3 pillars (port 3000)
  # node_exporter: EC2 system metrics (CPU, RAM, disk)
  # redis_exporter: Redis metrics
  # Config: observability/metrics/prometheus.yml
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../observability/metrics/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - back-tier

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - back-tier
      - front-tier

  node_exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    networks:
      - back-tier

  redis_exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - back-tier

volumes:
  db-data:
  prometheus-data:
  grafana-data:

networks:
  front-tier:
  back-tier:
